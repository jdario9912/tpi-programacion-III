<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Categorías — Panel de Administración</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 font-sans">
        <div class="flex flex-col h-screen" id="main-layout">
            <div class="flex flex-1 overflow-hidden" id="secondary-layout">
                <main class="flex-1 overflow-y-auto p-8">
                    <div class="flex items-center justify-between mb-7">
                        <div>
                            <h1 class="text-xl font-medium text-gray-900">
                                Categorías
                            </h1>
                            <p class="text-sm text-gray-400 mt-0.5">
                                Gestioná las categorías de tus productos
                            </p>
                        </div>
                        <button
                            class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
                            id="btn-categoria"
                        >
                            <svg
                                class="w-4 h-4"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M12 4v16m8-8H4"
                                />
                            </svg>
                            Nueva categoría
                        </button>
                    </div>

                    <div
                        class="bg-white border border-gray-200 rounded-xl overflow-hidden"
                    >
                        <table class="w-full text-sm">
                            <thead>
                                <tr
                                    class="border-b border-gray-100 bg-gray-50 text-left"
                                >
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        Nombre
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        Descripción
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500 text-right"
                                    >
                                        Acciones
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="tabla-body"></tbody>
                        </table>

                        <div
                            id="estado-vacio"
                            class="hidden flex flex-col items-center justify-center py-16 text-center"
                        >
                            <svg
                                class="w-10 h-10 text-gray-300 mb-3"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.5"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                                />
                            </svg>
                            <p class="text-gray-400 text-sm">
                                No se encontraron categorías
                            </p>
                        </div>
                    </div>

                    <p id="contador" class="text-xs text-gray-400 mt-3"></p>
                </main>
            </div>
        </div>

        <dialog
            id="modal-crear-categoria"
            class="backdrop:bg-black/50 rounded-xl p-0 w-full max-w-md"
        >
            <form
                id="form-crear-categoria"
                method="dialog"
                class="flex flex-col gap-4 p-6"
            >
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-gray-900">
                        Nueva Categoría
                    </h2>
                    <button
                        type="button"
                        data-close
                        class="text-gray-400 hover:text-gray-600"
                        aria-label="Cerrar"
                    >
                        ✕
                    </button>
                </div>

                <div class="flex flex-col gap-1">
                    <label
                        for="categoria-nombre"
                        class="text-sm font-medium text-gray-700"
                        >Nombre</label
                    >
                    <input
                        id="categoria-nombre"
                        name="nombre"
                        type="text"
                        required
                        class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Ej: Bebidas"
                    />
                </div>

                <div class="flex flex-col gap-1">
                    <label
                        for="categoria-descripcion"
                        class="text-sm font-medium text-gray-700"
                        >Descripción</label
                    >
                    <textarea
                        id="categoria-descripcion"
                        name="descripcion"
                        rows="3"
                        class="border border-gray-300 rounded-md px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Descripción opcional"
                    ></textarea>
                </div>

                <div class="flex justify-end gap-2 mt-2">
                    <button
                        type="button"
                        data-close
                        class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
                    >
                        Cancelar
                    </button>
                    <button
                        type="submit"
                        class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700"
                    >
                        Guardar
                    </button>
                </div>
            </form>
        </dialog>

        <dialog
            id="modal-editar-categoria"
            class="backdrop:bg-black/50 rounded-xl p-0 w-full max-w-md"
        >
            <form
                id="form-editar-categoria"
                method="dialog"
                class="flex flex-col gap-4 p-6"
            >
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-gray-900">
                        Editar Categoría
                    </h2>
                    <button
                        type="button"
                        data-close
                        class="text-gray-400 hover:text-gray-600"
                        aria-label="Cerrar"
                    >
                        ✕
                    </button>
                </div>

                <div class="flex flex-col gap-1">
                    <label
                        for="categoria-nombre"
                        class="text-sm font-medium text-gray-700"
                        >Nombre</label
                    >
                    <input
                        id="categoria-nombre"
                        name="nombre"
                        type="text"
                        required
                        class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Ej: Bebidas"
                    />
                </div>

                <div class="flex flex-col gap-1">
                    <label
                        for="categoria-descripcion"
                        class="text-sm font-medium text-gray-700"
                        >Descripción</label
                    >
                    <textarea
                        id="categoria-descripcion"
                        name="descripcion"
                        rows="3"
                        class="border border-gray-300 rounded-md px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Descripción opcional"
                    ></textarea>
                </div>

                <div class="flex justify-end gap-2 mt-2">
                    <button
                        type="button"
                        data-close
                        class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
                    >
                        Cancelar
                    </button>
                    <button
                        type="submit"
                        class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700"
                    >
                        Guardar
                    </button>
                </div>
            </form>
        </dialog>

        <dialog
            id="modal-eliminar-categoria"
            class="backdrop:bg-black/50 rounded-xl p-0 w-full max-w-sm"
        >
            <div class="flex flex-col gap-4 p-6">
                <div class="flex items-center gap-3">
                    <div
                        class="flex items-center justify-center w-10 h-10 rounded-full bg-red-100 text-red-600"
                    >
                        <svg
                            class="w-5 h-5"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
                            />
                        </svg>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-900">
                        Eliminar categoría
                    </h2>
                </div>

                <p class="text-sm text-gray-600">
                    ¿Estás seguro de que querés eliminar
                    <span
                        id="nombre-categoria-eliminar"
                        class="font-medium text-gray-900"
                    ></span
                    >? Esta acción no se puede deshacer.
                </p>

                <div class="flex justify-end gap-2 mt-2">
                    <button
                        type="button"
                        data-close
                        class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
                    >
                        Cancelar
                    </button>
                    <button
                        id="btn-confirmar-eliminar"
                        type="button"
                        class="px-4 py-2 text-sm rounded-md bg-red-600 text-white hover:bg-red-700"
                    >
                        Eliminar
                    </button>
                </div>
            </div>
        </dialog>
    </body>
    <script type="module" src="categorias.ts"></script>
</html>
