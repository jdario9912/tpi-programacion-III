<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Categorías — Panel de Administración</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 font-sans">
        <div class="flex flex-col h-screen" id="main-layout">
            <div class="flex flex-1 overflow-hidden" id="secondary-layout">
                <main class="flex-1 overflow-y-auto p-8">
                    <!-- Encabezado de página -->
                    <div class="flex items-center justify-between mb-7">
                        <div>
                            <h1 class="text-xl font-medium text-gray-900">
                                Categorías
                            </h1>
                            <p class="text-sm text-gray-400 mt-0.5">
                                Gestioná las categorías de tus productos
                            </p>
                        </div>
                        <!-- Botón CREAR -->
                        <button
                            onclick="abrirModal()"
                            class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
                        >
                            <svg
                                class="w-4 h-4"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M12 4v16m8-8H4"
                                />
                            </svg>
                            Nueva categoría
                        </button>
                    </div>

                    <!-- Barra de búsqueda -->
                    <div class="relative mb-5">
                        <svg
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"
                            />
                        </svg>
                        <input
                            type="text"
                            id="buscador"
                            placeholder="Buscar categoría..."
                            oninput="filtrarTabla()"
                            class="w-full pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                        />
                    </div>

                    <!-- Tabla -->
                    <div
                        class="bg-white border border-gray-200 rounded-xl overflow-hidden"
                    >
                        <table class="w-full text-sm">
                            <thead>
                                <tr
                                    class="border-b border-gray-100 bg-gray-50 text-left"
                                >
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        #
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        Nombre
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        Descripción
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        Productos
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500"
                                    >
                                        Estado
                                    </th>
                                    <th
                                        class="px-5 py-3 font-medium text-gray-500 text-right"
                                    >
                                        Acciones
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="tabla-body">
                                <!-- Las filas se generan con JS -->
                            </tbody>
                        </table>

                        <!-- Estado vacío -->
                        <div
                            id="estado-vacio"
                            class="hidden flex flex-col items-center justify-center py-16 text-center"
                        >
                            <svg
                                class="w-10 h-10 text-gray-300 mb-3"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.5"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                                />
                            </svg>
                            <p class="text-gray-400 text-sm">
                                No se encontraron categorías
                            </p>
                        </div>
                    </div>

                    <!-- Contador -->
                    <p id="contador" class="text-xs text-gray-400 mt-3"></p>
                </main>
            </div>
        </div>

        <!-- ======================================
       MODAL: Crear / Editar categoría
  ====================================== -->
        <div
            id="modal"
            class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40"
        >
            <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4 p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2
                        id="modal-titulo"
                        class="text-base font-medium text-gray-900"
                    >
                        Nueva categoría
                    </h2>
                    <button
                        onclick="cerrarModal()"
                        class="text-gray-400 hover:text-gray-600"
                    >
                        <svg
                            class="w-5 h-5"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M6 18L18 6M6 6l12 12"
                            />
                        </svg>
                    </button>
                </div>

                <div class="flex flex-col gap-4">
                    <div>
                        <label
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Nombre *</label
                        >
                        <input
                            id="campo-nombre"
                            type="text"
                            placeholder="Ej: Electrónica"
                            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300"
                        />
                        <p
                            id="error-nombre"
                            class="text-xs text-red-500 mt-1 hidden"
                        >
                            El nombre es obligatorio
                        </p>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Descripción</label
                        >
                        <textarea
                            id="campo-desc"
                            rows="3"
                            placeholder="Descripción breve de la categoría..."
                            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-indigo-300"
                        ></textarea>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Estado</label
                        >
                        <select
                            id="campo-estado"
                            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white"
                        >
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end gap-2 mt-6">
                    <button
                        onclick="cerrarModal()"
                        class="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors"
                    >
                        Cancelar
                    </button>
                    <button
                        onclick="guardarCategoria()"
                        class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors"
                    >
                        Guardar
                    </button>
                </div>
            </div>
        </div>

        <!-- ======================================
       MODAL: Confirmar eliminación
  ====================================== -->
        <div
            id="modal-eliminar"
            class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40"
        >
            <div class="bg-white rounded-xl shadow-lg w-full max-w-sm mx-4 p-6">
                <div class="flex items-start gap-3 mb-5">
                    <div
                        class="w-9 h-9 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0 mt-0.5"
                    >
                        <svg
                            class="w-4 h-4 text-red-600"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
                            />
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-base font-medium text-gray-900">
                            Eliminar categoría
                        </h2>
                        <p class="text-sm text-gray-500 mt-1">
                            ¿Seguro que querés eliminar
                            <strong
                                id="nombre-a-eliminar"
                                class="text-gray-800"
                            ></strong
                            >? Esta acción no se puede deshacer.
                        </p>
                    </div>
                </div>
                <div class="flex justify-end gap-2">
                    <button
                        onclick="cerrarModalEliminar()"
                        class="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors"
                    >
                        Cancelar
                    </button>
                    <button
                        onclick="confirmarEliminar()"
                        class="px-4 py-2 text-sm font-medium bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors"
                    >
                        Eliminar
                    </button>
                </div>
            </div>
        </div>

        <!-- ======================================
       TOAST de confirmación
  ====================================== -->
        <div
            id="toast"
            class="hidden fixed bottom-6 right-6 z-50 flex items-center gap-2 bg-gray-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-lg"
        >
            <svg
                class="w-4 h-4 text-green-400"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                viewBox="0 0 24 24"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M5 13l4 4L19 7"
                />
            </svg>
            <span id="toast-msg"></span>
        </div>

        <!-- ======================================
       JAVASCRIPT — lógica CRUD
  ====================================== -->
        <script></script>
    </body>
    <script type="module" src="categorias.ts"></script>
</html>
