<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex flex-col h-screen" id="main-layout">
      <div class="flex flex-1 overflow-hidden" id="secondary-layout">
        <main class="flex-1 overflow-y-auto p-8">
          <h1 class="text-xl font-medium text-gray-900 mb-1">
            Panel de administración
          </h1>
          <p class="text-sm text-gray-400 mb-7">Resumen general del comercio</p>

          <div class="grid grid-cols-2 gap-4">
            <div
              class="rounded-xl border border-indigo-200 bg-indigo-50 p-5 flex flex-col gap-3"
            >
              <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-indigo-800"
                  >Categorías</span
                >
                <div
                  class="w-9 h-9 rounded-lg bg-indigo-200 flex items-center justify-center"
                >
                  <svg
                    class="w-5 h-5 text-indigo-900"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a2 2 0 012-2z"
                    />
                  </svg>
                </div>
              </div>
              <div>
                <p
                  class="text-3xl font-medium text-indigo-900"
                  id="categorias-activas-count"
                ></p>
                <p class="text-xs text-indigo-600 mt-0.5">categorías activas</p>
              </div>
              <a
                href="categorias.html"
                class="self-start flex items-center gap-1 text-xs text-indigo-800 border border-indigo-300 rounded-lg px-3 py-1.5 hover:bg-indigo-200 transition-colors"
              >
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 5l7 7-7 7"
                  />
                </svg>
                Ver categorías
              </a>
            </div>

            <div
              class="rounded-xl border border-teal-200 bg-teal-50 p-5 flex flex-col gap-3"
            >
              <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-teal-800">Productos</span>
                <div
                  class="w-9 h-9 rounded-lg bg-teal-200 flex items-center justify-center"
                >
                  <svg
                    class="w-5 h-5 text-teal-900"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"
                    />
                  </svg>
                </div>
              </div>
              <div>
                <p
                  class="text-3xl font-medium text-teal-900"
                  id="productos-registrados-count"
                ></p>
                <p class="text-xs text-teal-600 mt-0.5">
                  productos registrados
                </p>
              </div>
              <a
                href="productos.html"
                class="self-start flex items-center gap-1 text-xs text-teal-800 border border-teal-300 rounded-lg px-3 py-1.5 hover:bg-teal-200 transition-colors"
              >
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 5l7 7-7 7"
                  />
                </svg>
                Ver productos
              </a>
            </div>

            <div
              class="rounded-xl border border-amber-200 bg-amber-50 p-5 flex flex-col gap-3"
            >
              <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-amber-800">Pedidos</span>
                <div
                  class="w-9 h-9 rounded-lg bg-amber-200 flex items-center justify-center"
                >
                  <svg
                    class="w-5 h-5 text-amber-900"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                    />
                  </svg>
                </div>
              </div>
              <div>
                <p
                  class="text-3xl font-medium text-amber-900"
                  id="pedidos-pendientes-count"
                ></p>
                <p class="text-xs text-amber-600 mt-0.5">pedidos pendientes</p>
              </div>
              <a
                href="pedidos.html"
                class="self-start flex items-center gap-1 text-xs text-amber-800 border border-amber-300 rounded-lg px-3 py-1.5 hover:bg-amber-200 transition-colors"
              >
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 5l7 7-7 7"
                  />
                </svg>
                Ver pedidos
              </a>
            </div>

            <div
              class="rounded-xl border border-red-200 bg-red-50 p-5 flex flex-col gap-3"
            >
              <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-red-800"
                  >Disponibles</span
                >
                <div
                  class="w-9 h-9 rounded-lg bg-red-200 flex items-center justify-center"
                >
                  <svg
                    class="w-5 h-5 text-red-900"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                </div>
              </div>
              <div>
                <p
                  class="text-3xl font-medium text-red-900"
                  id="productos-disponibles-count"
                ></p>
                <p class="text-xs text-red-600 mt-0.5">productos disponibles</p>
              </div>
              <a
                href="productos.html"
                class="self-start flex items-center gap-1 text-xs text-red-800 border border-red-300 rounded-lg px-3 py-1.5 hover:bg-red-200 transition-colors"
              >
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 5l7 7-7 7"
                  />
                </svg>
                Ver disponibles
              </a>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
  <script type="module" src="../../main.ts"></script>
  <script type="module" src="home.ts"></script>
</html>
