<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos — Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex flex-col h-screen" id="main-layout">
      <div class="flex flex-1 overflow-hidden" id="secondary-layout">
        <main class="flex-1 overflow-y-auto p-8">
          <!-- Encabezado -->
          <div class="flex items-center justify-between mb-7">
            <div>
              <h1 class="text-xl font-medium text-gray-900">Productos</h1>
              <p class="text-sm text-gray-400 mt-0.5">
                Administrá el catálogo de productos
              </p>
            </div>
            <button
              id="btn-crear-producto"
              class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              Nuevo producto
            </button>
          </div>

          <!-- Filtros -->
          <div class="flex gap-3 mb-5">
            <select
              id="filtro-categoria"
              class="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            >
              <option value="">Todas las categorías</option>
            </select>
          </div>

          <!-- Tabla -->
          <div
            class="bg-white border border-gray-200 rounded-xl overflow-hidden"
          >
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-100 bg-gray-50 text-left">
                  <th class="px-5 py-3 font-medium text-gray-500">#</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Producto</th>
                  <th class="px-5 py-3 font-medium text-gray-500">
                    Descripcion
                  </th>
                  <th class="px-5 py-3 font-medium text-gray-500">Categoría</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Precio</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Stock</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Estado</th>
                  <th class="px-5 py-3 font-medium text-gray-500 text-right">
                    Acciones
                  </th>
                </tr>
              </thead>
              <tbody id="tabla-body"></tbody>
            </table>
            <div
              id="estado-vacio"
              class="hidden flex flex-col items-center justify-center py-16 text-center"
            >
              <svg
                class="w-10 h-10 text-gray-300 mb-3"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"
                />
              </svg>
              <p class="text-gray-400 text-sm">No se encontraron productos</p>
            </div>
          </div>
          <p id="contador" class="text-xs text-gray-400 mt-3"></p>
        </main>
      </div>
    </div>

    <dialog
      id="modal-crear-producto"
      class="backdrop:bg-black/50 rounded-xl p-0 w-full max-w-md"
    >
      <form
        id="form-crear-producto"
        method="dialog"
        class="flex flex-col gap-4 p-6"
      >
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-900">Nuevo producto</h2>
          <button
            type="button"
            data-close
            class="text-gray-400 hover:text-gray-600"
            aria-label="Cerrar"
          >
            ✕
          </button>
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-nombre" class="text-sm font-medium text-gray-700"
            >Nombre</label
          >
          <input
            id="producto-nombre"
            name="nombre"
            type="text"
            required
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ej: Pizza"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label
            for="producto-descripcion"
            class="text-sm font-medium text-gray-700"
            >Descripción</label
          >
          <textarea
            id="producto-descripcion"
            name="descripcion"
            rows="3"
            class="border border-gray-300 rounded-md px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Descripción opcional"
          ></textarea>
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-precio" class="text-sm font-medium text-gray-700"
            >Precio</label
          >
          <input
            id="producto-precio"
            name="precio"
            type="text"
            required
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-stock" class="text-sm font-medium text-gray-700"
            >Stock</label
          >
          <input
            id="producto-stock"
            name="stock"
            type="number"
            required
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label
            for="producto-categoria"
            class="text-sm font-medium text-gray-700"
            >Categoria</label
          >
          <select id="producto-categoria" name="categoria"></select>
        </div>

        <div>
          <label
            for="producto-disponible"
            class="text-sm font-medium text-gray-700"
            >Disponible</label
          >
          <input
            type="checkbox"
            id="producto-disponible"
            name="disponible"
            checked
          />
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-imagen" class="text-sm font-medium text-gray-700"
            >Imagen</label
          >
          <input
            id="producto-imagen"
            name="imagen"
            type="url"
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            value="http://imagen.com"
          />
        </div>

        <div class="flex justify-end gap-2 mt-2">
          <button
            type="button"
            data-close
            class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700"
          >
            Guardar
          </button>
        </div>
      </form>
    </dialog>

    <dialog
      id="modal-editar-producto"
      class="backdrop:bg-black/50 rounded-xl p-0 w-full max-w-md"
    >
      <form
        id="form-editar-producto"
        method="dialog"
        class="flex flex-col gap-4 p-6"
      >
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-900">Nuevo producto</h2>
          <button
            type="button"
            data-close
            class="text-gray-400 hover:text-gray-600"
            aria-label="Cerrar"
          >
            ✕
          </button>
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-nombre" class="text-sm font-medium text-gray-700"

          >
          <input
            id="producto-nombre"
            name="nombre"
            type="text"
            required
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ej: Pizza"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label
            for="producto-descripcion"
            class="text-sm font-medium text-gray-700"
            >Descripción</label
          >
          <textarea
            id="producto-descripcion"
            name="descripcion"
            rows="3"
            class="border border-gray-300 rounded-md px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Descripción opcional"
          ></textarea>
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-precio" class="text-sm font-medium text-gray-700"
            >Precio</label
          >
          <input
            id="producto-precio"
            name="precio"
            type="text"
            required
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-stock" class="text-sm font-medium text-gray-700"
            >Stock</label
          >
          <input
            id="producto-stock"
            name="stock"
            type="number"
            required
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label
            for="producto-categoria-editar"
            class="text-sm font-medium text-gray-700"
            >Categoria</label
          >
          <select id="producto-categoria-editar" name="categoria"></select>
        </div>

        <div>
          <label
            for="producto-disponible"
            class="text-sm font-medium text-gray-700"
            >Disponible</label
          >
          <input
            type="checkbox"
            id="producto-disponible"
            name="disponible"
            checked
          />
        </div>

        <div class="flex flex-col gap-1">
          <label for="producto-imagen" class="text-sm font-medium text-gray-700"
            >Imagen</label
          >
          <input
            id="producto-imagen"
            name="imagen"
            type="url"
            class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            value="http://imagen.com"
          />
        </div>

        <div class="flex justify-end gap-2 mt-2">
          <button
            type="button"
            data-close
            class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700"
          >
            Guardar
          </button>
        </div>
      </form>
    </dialog>

    <dialog
      id="modal-eliminar-producto"
      class="backdrop:bg-black/50 rounded-xl p-0 w-full max-w-sm"
    >
      <div class="flex flex-col gap-4 p-6">
        <div class="flex items-center gap-3">
          <div
            class="flex items-center justify-center w-10 h-10 rounded-full bg-red-100 text-red-600"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
              />
            </svg>
          </div>
          <h2 class="text-lg font-semibold text-gray-900">Eliminar producto</h2>
        </div>

        <p class="text-sm text-gray-600">
          ¿Estás seguro de que querés eliminar
          <span
            id="nombre-producto-eliminar"
            class="font-medium text-gray-900"
          ></span
          >? Esta acción no se puede deshacer.
        </p>

        <div class="flex justify-end gap-2 mt-2">
          <button
            type="button"
            data-close
            class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
          >
            Cancelar
          </button>
          <button
            id="btn-confirmar-eliminar"
            type="button"
            class="px-4 py-2 text-sm rounded-md bg-red-600 text-white hover:bg-red-700"
          >
            Eliminar
          </button>
        </div>
      </div>
    </dialog>

    <!-- MODAL Ver detalle -->
    <div
      id="modal-ver"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40"
    >
      <div class="bg-white rounded-xl shadow-lg w-full max-w-sm mx-4 p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-medium text-gray-900">
            Detalle del producto
          </h2>
          <button
            onclick="cerrarVer()"
            class="text-gray-400 hover:text-gray-600"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div id="detalle-body" class="flex flex-col gap-3 text-sm"></div>
        <div class="flex justify-end mt-5">
          <button
            onclick="cerrarVer()"
            class="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors"
          >
            Cerrar
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="hidden fixed bottom-6 right-6 z-50 flex items-center gap-2 bg-gray-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-lg"
    >
      <svg
        class="w-4 h-4 text-green-400"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M5 13l4 4L19 7"
        />
      </svg>
      <span id="toast-msg"></span>
    </div>
