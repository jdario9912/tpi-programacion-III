<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos — Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex flex-col h-screen" id="main-layout">
      <div class="flex flex-1 overflow-hidden" id="secondary-layout">
        <main class="flex-1 overflow-y-auto p-8">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-xl font-medium text-gray-900">Pedidos</h1>
              <p class="text-sm text-gray-400 mt-0.5">
                Seguimiento y gestión de pedidos
              </p>
            </div>
          </div>
          <div
            class="bg-white border border-gray-200 rounded-xl overflow-hidden"
          >
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-100 bg-gray-50 text-left">
                  <th class="px-5 py-3 font-medium text-gray-500">Pedido</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Fecha</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Items</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Total</th>
                  <th class="px-5 py-3 font-medium text-gray-500">Estado</th>
                  <th class="px-5 py-3 font-medium text-gray-500 text-right">
                    Acciones
                  </th>
                </tr>
              </thead>
              <tbody id="tabla-body"></tbody>
            </table>
            <div
              id="estado-vacio"
              class="hidden flex flex-col items-center justify-center py-16 text-center"
            >
              <svg
                class="w-10 h-10 text-gray-300 mb-3"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                />
              </svg>
              <p class="text-gray-400 text-sm">No se encontraron pedidos</p>
            </div>
          </div>
          <p id="contador" class="text-xs text-gray-400 mt-3"></p>
        </main>
      </div>
    </div>

    <dialog
      id="modal-ver-pedido"
      class="backdrop:bg-black/50 rounded-xl w-[700px]"
    >
      <form class="bg-white p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-base font-medium text-gray-900">
            Detalle del pedido
          </h2>

          <button class="text-gray-400 hover:text-gray-600">
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-5 text-sm">
          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500">Pedido</p>
            <p id="pedido-id" class="font-medium"></p>
          </div>

          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500">Fecha</p>
            <p id="pedido-fecha" class="font-medium"></p>
          </div>

          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500">Forma de pago</p>
            <p id="pedido-pago" class="font-medium"></p>
          </div>

          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500">Total</p>
            <p id="pedido-total" class="font-semibold text-green-600"></p>
          </div>
        </div>

        <div class="mb-5">
          <h3 class="text-sm font-medium text-gray-900 mb-2">Productos</h3>

          <div class="border rounded-lg overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-gray-100 text-gray-600">
                <tr>
                  <th class="text-left px-3 py-2">Producto</th>
                  <th class="text-center px-3 py-2">Cant.</th>
                  <th class="text-right px-3 py-2">Precio</th>
                  <th class="text-right px-3 py-2">Subtotal</th>
                </tr>
              </thead>

              <tbody id="detalle-productos"></tbody>
            </table>
          </div>
        </div>

        <div class="mb-5">
          <label class="block text-xs font-medium text-gray-600 mb-1">
            Cambiar estado
          </label>
          <input type="hidden" id="pedido_id_hidden" name="pedido_id_hidden" />
          <select
            id="estado"
            name="estado"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300"
          >
            <option value="PENDIENTE">Pendiente</option>
            <option value="CONFIRMADO">Confirmado</option>
            <option value="TERMINADO">Terminado</option>
            <option value="CANCELADO">Cancelado</option>
          </select>
        </div>

        <div class="flex justify-end gap-2">
          <button
            type="button"
            data-close
            class="px-4 py-2 text-sm rounded-md text-gray-600 hover:bg-gray-100"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700"
          >
            Guardar
          </button>
        </div>
      </form>
    </dialog>
