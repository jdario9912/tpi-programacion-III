<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register</title>
    </head>

    <body>
        <h1>Registro</h1>

        <form id="form">
            <div>
                <label for="nombre">Nombre</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    autocomplete="off"
                    placeholder="Nombre"
                />
            </div>
            <div>
                <label for="apellido">Apellido</label>
                <input
                    type="text"
                    id="apellido"
                    name="apellido"
                    autocomplete="off"
                    placeholder="Apellido"
                />
            </div>
            <div>
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="off"
                    placeholder="example@example.com"
                />
            </div>
            <div>
                <label for="password">password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="off"
                    placeholder="********"
                />
            </div>

            <button type="submit">Registrarme</button>
        </form>

        <script type="module" src="./registro.ts"></script>
    </body>
</html>
