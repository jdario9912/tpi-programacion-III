<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../../../style.css" />
        <title>Login</title>
    </head>

    <body>
        <h1>Login</h1>

        <form id="form">
            <div>
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="off"
                    value="admin@admin.com"
                    placeholder="example@example.com"
                    class="border-orange-600 borderborder-2"
                />
            </div>
            <div>
                <label for="password">password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    value="123456"
                    autocomplete="off"
                    placeholder="********"
                />
            </div>

            <div>
                <span style="color: red; display: none" id="alert">
                    Usuario o Contraseña incorrecta</span
                >
            </div>

            <button type="submit">Ingresar</button>
        </form>
        <div>
            <p>
                <a href="/src/pages/auth/registro/registro.html">Registrarme</a>
            </p>
        </div>

        <script type="module" src="./login.ts"></script>
    </body>
</html>
