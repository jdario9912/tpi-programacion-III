<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Iniciar sesión — MiComercio</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body
        class="bg-gray-100 font-sans min-h-screen flex items-center justify-center"
    >
        <div class="w-full max-w-sm mx-4">
            <!-- Logo -->
            <div class="flex flex-col items-center mb-8">
                <div
                    class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center mb-3"
                >
                    <svg
                        class="w-6 h-6 text-white"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 9l1-5h16l1 5M3 9h18M3 9v11a1 1 0 001 1h4v-5h8v5h4a1 1 0 001-1V9"
                        />
                    </svg>
                </div>
                <h1 class="text-xl font-medium text-gray-900">MiComercio</h1>
                <p class="text-sm text-gray-400 mt-1">
                    Ingresá a tu panel de administración
                </p>
            </div>

            <!-- Card -->
            <div class="bg-white border border-gray-200 rounded-2xl p-8">
                <h2 class="text-base font-medium text-gray-900 mb-6">
                    Iniciar sesión
                </h2>

                <!-- Alerta de error -->
                <div
                    id="alert"
                    class="hidden flex items-center gap-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-5"
                >
                    <svg
                        class="w-4 h-4 flex-shrink-0"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
                        />
                    </svg>
                    Usuario o contraseña incorrecta
                </div>

                <!-- Formulario -->
                <form id="login-form" novalidate class="flex flex-col gap-4">
                    <div>
                        <label
                            for="email"
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Email</label
                        >
                        <input
                            id="email"
                            type="email"
                            placeholder="tu@email.com"
                            autocomplete="email"
                            class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400"
                        />
                        <p
                            id="err-email"
                            class="hidden text-xs text-red-500 mt-1"
                        >
                            Ingresá un email válido
                        </p>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label
                                for="password"
                                class="block text-xs font-medium text-gray-600"
                                >Contraseña</label
                            >
                            <a
                                href="#"
                                class="text-xs text-indigo-600 hover:underline"
                                >¿Olvidaste tu contraseña?</a
                            >
                        </div>
                        <div class="relative">
                            <input
                                id="password"
                                type="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400 pr-10"
                            />
                            <button
                                type="button"
                                id="toggle-pass"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                            >
                                <svg
                                    id="icon-show"
                                    class="w-4 h-4"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                    />
                                </svg>
                                <svg
                                    id="icon-hide"
                                    class="w-4 h-4 hidden"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                    />
                                </svg>
                            </button>
                        </div>
                        <p
                            id="err-pass"
                            class="hidden text-xs text-red-500 mt-1"
                        >
                            La contraseña es obligatoria
                        </p>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors mt-1"
                    >
                        Iniciar sesión
                    </button>
                </form>
            </div>

            <p class="text-center text-sm text-gray-400 mt-5">
                ¿No tenés cuenta?
                <a
                    href="/src/pages/auth/registro.html"
                    class="text-indigo-600 hover:underline font-medium"
                    >Registrate</a
                >
            </p>
        </div>

        <script type="module" src="./login.ts"></script>
        <script>
            // Toggle mostrar/ocultar contraseña

            // Submit
        </script>
    </body>
</html>
