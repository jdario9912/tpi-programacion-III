<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registro — MiComercio</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body
        class="bg-gray-100 font-sans min-h-screen flex items-center justify-center py-10"
    >
        <div class="w-full max-w-sm mx-4">
            <!-- Logo -->
            <div class="flex flex-col items-center mb-8">
                <div
                    class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center mb-3"
                >
                    <svg
                        class="w-6 h-6 text-white"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 9l1-5h16l1 5M3 9h18M3 9v11a1 1 0 001 1h4v-5h8v5h4a1 1 0 001-1V9"
                        />
                    </svg>
                </div>
                <h1 class="text-xl font-medium text-gray-900">MiComercio</h1>
                <p class="text-sm text-gray-400 mt-1">
                    Creá tu cuenta de administrador
                </p>
            </div>

            <!-- Card -->
            <div class="bg-white border border-gray-200 rounded-2xl p-8">
                <h2 class="text-base font-medium text-gray-900 mb-6">
                    Crear cuenta
                </h2>

                <!-- Alerta de error -->
                <div
                    id="alert"
                    class="hidden flex items-center gap-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-5"
                >
                    <svg
                        class="w-4 h-4 flex-shrink-0"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
                        />
                    </svg>
                    <span id="alert-msg"
                        >Ocurrió un error al crear la cuenta</span
                    >
                </div>

                <!-- Formulario -->
                <form id="registro-form" novalidate class="flex flex-col gap-4">
                    <!-- Nombre y Apellido -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label
                                for="nombre"
                                class="block text-xs font-medium text-gray-600 mb-1"
                                >Nombre *</label
                            >
                            <input
                                id="nombre"
                                type="text"
                                placeholder="Juan"
                                autocomplete="given-name"
                                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400"
                            />
                            <p
                                id="err-nombre"
                                class="hidden text-xs text-red-500 mt-1"
                            >
                                Requerido
                            </p>
                        </div>
                        <div>
                            <label
                                for="apellido"
                                class="block text-xs font-medium text-gray-600 mb-1"
                                >Apellido *</label
                            >
                            <input
                                id="apellido"
                                type="text"
                                placeholder="Pérez"
                                autocomplete="family-name"
                                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400"
                            />
                            <p
                                id="err-apellido"
                                class="hidden text-xs text-red-500 mt-1"
                            >
                                Requerido
                            </p>
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label
                            for="email"
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Email *</label
                        >
                        <input
                            id="email"
                            type="email"
                            placeholder="tu@email.com"
                            autocomplete="email"
                            class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400"
                        />
                        <p
                            id="err-email"
                            class="hidden text-xs text-red-500 mt-1"
                        >
                            Ingresá un email válido
                        </p>
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label
                            for="password"
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Contraseña *</label
                        >
                        <div class="relative">
                            <input
                                id="password"
                                type="password"
                                placeholder="Mínimo 8 caracteres"
                                autocomplete="new-password"
                                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400 pr-10"
                            />
                            <button
                                type="button"
                                id="toggle-pass"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                            >
                                <svg
                                    id="icon-show"
                                    class="w-4 h-4"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                    />
                                </svg>
                                <svg
                                    id="icon-hide"
                                    class="w-4 h-4 hidden"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                    />
                                </svg>
                            </button>
                        </div>
                        <p
                            id="err-pass"
                            class="hidden text-xs text-red-500 mt-1"
                        >
                            La contraseña debe tener al menos 8 caracteres
                        </p>
                    </div>

                    <!-- Confirmar contraseña -->
                    <div>
                        <label
                            for="confirm-password"
                            class="block text-xs font-medium text-gray-600 mb-1"
                            >Confirmar contraseña *</label
                        >
                        <input
                            id="confirm-password"
                            type="password"
                            placeholder="Repetí tu contraseña"
                            autocomplete="new-password"
                            class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-gray-400"
                        />
                        <p
                            id="err-confirm"
                            class="hidden text-xs text-red-500 mt-1"
                        >
                            Las contraseñas no coinciden
                        </p>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors mt-1"
                    >
                        Crear cuenta
                    </button>
                </form>
            </div>

            <p class="text-center text-sm text-gray-400 mt-5">
                ¿Ya tenés cuenta?
                <a
                    href="login.html"
                    class="text-indigo-600 hover:underline font-medium"
                    >Iniciá sesión</a
                >
            </p>
        </div>

        <script>
            // Toggle contraseña
            document
                .getElementById("toggle-pass")
                .addEventListener("click", () => {
                    const input = document.getElementById("password");
                    const show = document.getElementById("icon-show");
                    const hide = document.getElementById("icon-hide");
                    const esPass = input.type === "password";
                    input.type = esPass ? "text" : "password";
                    show.classList.toggle("hidden", esPass);
                    hide.classList.toggle("hidden", !esPass);
                });

            // Submit
            document
                .getElementById("registro-form")
                .addEventListener("submit", (e) => {
                    e.preventDefault();

                    const nombre = document
                        .getElementById("nombre")
                        .value.trim();
                    const apellido = document
                        .getElementById("apellido")
                        .value.trim();
                    const email = document.getElementById("email").value.trim();
                    const password = document.getElementById("password").value;
                    const confirm =
                        document.getElementById("confirm-password").value;
                    const alertEl = document.getElementById("alert");
                    let ok = true;

                    // Validaciones
                    document
                        .getElementById("err-nombre")
                        .classList.toggle("hidden", nombre.length > 0);
                    if (!nombre) ok = false;

                    document
                        .getElementById("err-apellido")
                        .classList.toggle("hidden", apellido.length > 0);
                    if (!apellido) ok = false;

                    const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(
                        email,
                    );
                    document
                        .getElementById("err-email")
                        .classList.toggle("hidden", emailValido);
                    if (!emailValido) ok = false;

                    const passValida = password.length >= 8;
                    document
                        .getElementById("err-pass")
                        .classList.toggle("hidden", passValida);
                    if (!passValida) ok = false;

                    const confirmValida =
                        password === confirm && confirm.length > 0;
                    document
                        .getElementById("err-confirm")
                        .classList.toggle("hidden", confirmValida);
                    if (!confirmValida) ok = false;

                    if (!ok) {
                        alertEl.classList.add("hidden");
                        return;
                    }

                    // Acá va tu llamado al backend
                    // const res = await fetch('/api/registro', { method: 'POST', body: JSON.stringify({ nombre, apellido, email, password }) })
                    // if (!res.ok) { mostrarAlert('El email ya está registrado'); return; }
                    // window.location.href = 'home.html';

                    console.log("Datos listos para enviar:", {
                        nombre,
                        apellido,
                        email,
                        password,
                    });
                });

            function mostrarAlert(msg) {
                const alertEl = document.getElementById("alert");
                document.getElementById("alert-msg").textContent = msg;
                alertEl.classList.remove("hidden");
            }
        </script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register</title>
    </head>

    <body>
        <h1>Registro</h1>

        <form id="form">
            <div>
                <label for="nombre">Nombre</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    autocomplete="off"
                    placeholder="Nombre"
                />
            </div>
            <div>
                <label for="apellido">Apellido</label>
                <input
                    type="text"
                    id="apellido"
                    name="apellido"
                    autocomplete="off"
                    placeholder="Apellido"
                />
            </div>
            <div>
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="off"
                    placeholder="example@example.com"
                />
            </div>
            <div>
                <label for="password">password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="off"
                    placeholder="********"
                />
            </div>

            <button type="submit">Registrarme</button>
        </form>

        <script type="module" src="./registro.ts"></script>
    </body>
</html>
