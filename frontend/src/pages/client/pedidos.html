<!doctype html>

    <title>Mis pedidos — MiComercio</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans min-h-screen">

            class="text-sm text-indigo-600 hover:underline"
