<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Catálogo — MiComercio</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 font-sans min-h-screen">
        <!-- TOPBAR -->
        <header
            class="bg-white border-b border-gray-200 px-6 h-14 flex items-center justify-between sticky top-0 z-10"
        >
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center"
                >
                    <svg
                        class="w-4 h-4 text-white"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 9l1-5h16l1 5M3 9h18M3 9v11a1 1 0 001 1h4v-5h8v5h4a1 1 0 001-1V9"
                        />
                    </svg>
                </div>
                <span class="text-sm font-medium text-gray-900"
                    >MiComercio</span
                >
            </div>
            <a
                href="carrito.html"
                class="relative flex items-center gap-2 text-sm text-gray-600 hover:text-indigo-600 transition-colors"
            >
                <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 6h13M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z"
                    />
                </svg>
                Carrito
                <span
                    id="carrito-badge"
                    class="hidden absolute -top-2 -right-2 w-4 h-4 bg-indigo-600 text-white text-xs rounded-full flex items-center justify-center"
                    >0</span
                >
            </a>
        </header>

        <div class="flex max-w-7xl mx-auto px-4 py-6 gap-6">
            <!-- SIDEBAR categorías -->
            <aside class="w-52 flex-shrink-0">
                <div
                    class="bg-white border border-gray-200 rounded-xl p-4 sticky top-20"
                >
                    <p
                        class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-3"
                    >
                        Categorías
                    </p>
                    <div class="flex flex-col gap-1" id="sidebar-cats"></div>
                </div>
            </aside>

            <!-- CONTENIDO -->
            <main class="flex-1">
                <!-- Buscador -->
                <div class="flex gap-3 mb-6">
                    <div class="relative flex-1">
                        <svg
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"
                            />
                        </svg>
                        <input
                            id="buscador"
                            type="text"
                            placeholder="Buscar productos..."
                            oninput="filtrar()"
                            class="w-full pl-9 pr-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                        />
                    </div>
                    <button
                        onclick="verTodos()"
                        class="flex items-center gap-2 px-4 py-2.5 text-sm border border-gray-200 bg-white rounded-lg text-gray-600 hover:bg-gray-50 transition-colors"
                    >
                        <svg
                            class="w-4 h-4"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M4 6h16M4 12h16M4 18h16"
                            />
                        </svg>
                        Ver todos
                    </button>
                </div>

                <!-- Título filtro activo -->
                <div class="flex items-center justify-between mb-4">
                    <h1
                        id="titulo-filtro"
                        class="text-base font-medium text-gray-800"
                    >
                        Todos los productos
                    </h1>
                    <p id="contador" class="text-xs text-gray-400"></p>
                </div>

                <!-- Grid de productos -->
                <div
                    id="grid-productos"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
                ></div>

                <!-- Vacío -->
                <div
                    id="estado-vacio"
                    class="hidden flex flex-col items-center justify-center py-20 text-center"
                >
                    <svg
                        class="w-12 h-12 text-gray-300 mb-3"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"
                        />
                    </svg>
                    <p class="text-gray-400 text-sm">
                        No se encontraron productos
                    </p>
                </div>
            </main>
        </div>

        <script>
            const productos = [
                {
                    id: 1,
                    nombre: "Auriculares Bluetooth",
                    categoria: "Electrónica",
                    descripcion:
                        "Sonido premium con cancelación de ruido activa.",
                    precio: 12999,
                    stock: 15,
                    img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&q=80",
                },
                {
                    id: 2,
                    nombre: "Remera básica",
                    categoria: "Ropa",
                    descripcion: "100% algodón, varios colores disponibles.",
                    precio: 3500,
                    stock: 80,
                    img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&q=80",
                },
                {
                    id: 3,
                    nombre: "Silla ergonómica",
                    categoria: "Hogar",
                    descripcion:
                        "Soporte lumbar ajustable, ideal para home office.",
                    precio: 45000,
                    stock: 0,
                    img: "https://images.unsplash.com/photo-1580480055273-228ff5388ef8?w=400&q=80",
                },
                {
                    id: 4,
                    nombre: "Pelota de fútbol",
                    categoria: "Deportes",
                    descripcion:
                        "Cuero sintético oficial, tamaño reglamentario.",
                    precio: 8200,
                    stock: 12,
                    img: "https://images.unsplash.com/photo-1614632537423-1e6c2e7e0aab?w=400&q=80",
                },
                {
                    id: 5,
                    nombre: "Granola artesanal",
                    categoria: "Alimentación",
                    descripcion: "Mix de semillas y frutas secas x 500g.",
                    precio: 2100,
                    stock: 34,
                    img: "https://images.unsplash.com/photo-1517093157656-b9eccef91cb1?w=400&q=80",
                },
                {
                    id: 6,
                    nombre: 'Smart TV 43"',
                    categoria: "Electrónica",
                    descripcion: "4K UHD con Android TV y control por voz.",
                    precio: 189000,
                    stock: 5,
                    img: "https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=400&q=80",
                },
                {
                    id: 7,
                    nombre: "Zapatillas running",
                    categoria: "Deportes",
                    descripcion:
                        "Suela amortiguada, disponible en talles 38-46.",
                    precio: 22500,
                    stock: 8,
                    img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80",
                },
                {
                    id: 8,
                    nombre: "Lámpara de escritorio",
                    categoria: "Hogar",
                    descripcion: "Luz LED regulable, brazo articulado.",
                    precio: 6800,
                    stock: 20,
                    img: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&q=80",
                },
                {
                    id: 9,
                    nombre: "Campera impermeable",
                    categoria: "Ropa",
                    descripcion: "Resistente al agua, capucha desmontable.",
                    precio: 18500,
                    stock: 0,
                    img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400&q=80",
                },
            ];

            const categorias = [...new Set(productos.map((p) => p.categoria))];
            let categoriaActiva = null;

            function fmt(n) {
                return "$" + Number(n).toLocaleString("es-AR");
            }

            // Sidebar
            function renderSidebar() {
                const cont = document.getElementById("sidebar-cats");
                cont.innerHTML = categorias
                    .map(
                        (cat) => `
        <button onclick="filtrarCategoria('${cat}')" id="cat-${cat.replace(/\s/g, "_")}"
          class="cat-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition-colors">
          ${cat}
        </button>
      `,
                    )
                    .join("");
            }

            function setActivaCat(cat) {
                document.querySelectorAll(".cat-btn").forEach((btn) => {
                    btn.className =
                        "cat-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition-colors";
                });
                if (cat) {
                    const btn = document.getElementById(
                        "cat-" + cat.replace(/\s/g, "_"),
                    );
                    if (btn)
                        btn.className =
                            "cat-btn w-full text-left px-3 py-2 rounded-lg text-sm bg-indigo-50 text-indigo-700 font-medium";
                }
            }

            function filtrarCategoria(cat) {
                categoriaActiva = cat;
                document.getElementById("buscador").value = "";
                setActivaCat(cat);
                document.getElementById("titulo-filtro").textContent = cat;
                renderProductos(productos.filter((p) => p.categoria === cat));
            }

            function verTodos() {
                categoriaActiva = null;
                document.getElementById("buscador").value = "";
                setActivaCat(null);
                document.getElementById("titulo-filtro").textContent =
                    "Todos los productos";
                renderProductos(productos);
            }

            function filtrar() {
                const q = document
                    .getElementById("buscador")
                    .value.toLowerCase();
                setActivaCat(null);
                categoriaActiva = null;
                const base = q
                    ? productos.filter(
                          (p) =>
                              p.nombre.toLowerCase().includes(q) ||
                              p.descripcion.toLowerCase().includes(q) ||
                              p.categoria.toLowerCase().includes(q),
                      )
                    : productos;
                document.getElementById("titulo-filtro").textContent = q
                    ? `Resultados para "${q}"`
                    : "Todos los productos";
                renderProductos(base);
            }

            function renderProductos(lista) {
                const grid = document.getElementById("grid-productos");
                const vacio = document.getElementById("estado-vacio");
                document.getElementById("contador").textContent =
                    `${lista.length} producto${lista.length !== 1 ? "s" : ""}`;
                if (!lista.length) {
                    grid.innerHTML = "";
                    vacio.classList.remove("hidden");
                    return;
                }
                vacio.classList.add("hidden");
                grid.innerHTML = lista
                    .map(
                        (p) => `
        <a href="producto.html?id=${p.id}"
          class="bg-white border border-gray-200 rounded-xl overflow-hidden hover:shadow-md hover:-translate-y-0.5 transition-all flex flex-col">
          <div class="aspect-video overflow-hidden bg-gray-100">
            <img src="${p.img}" alt="${p.nombre}" class="w-full h-full object-cover"/>
          </div>
          <div class="p-4 flex flex-col gap-2 flex-1">
            <span class="text-xs text-indigo-600 font-medium">${p.categoria}</span>
            <h3 class="text-sm font-medium text-gray-900 leading-snug">${p.nombre}</h3>
            <p class="text-xs text-gray-400 line-clamp-2 flex-1">${p.descripcion}</p>
            <div class="flex items-center justify-between mt-1">
              <span class="text-base font-medium text-gray-900">${fmt(p.precio)}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${p.stock > 0 ? "bg-teal-50 text-teal-700" : "bg-red-50 text-red-500"}">
                ${p.stock > 0 ? `${p.stock} en stock` : "Sin stock"}
              </span>
            </div>
          </div>
        </a>
      `,
                    )
                    .join("");
            }

            renderSidebar();
            renderProductos(productos);
        </script>
    </body>
</html>
