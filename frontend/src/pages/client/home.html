<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo — MiComercio</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans min-h-screen">
    <div class="flex flex-col h-screen" id="main-layout">
      <div class="flex flex-1 overflow-y-scroll" id="secondary-layout">
        <aside class="w-52 shrink-0">
          <div class="bg-white border border-gray-200 p-4">
            <p
              class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-6"
            >
              Categorías
            </p>
            <div class="flex flex-col gap-4" id="sidebar-categorias"></div>
          </div>
        </aside>

        <main class="flex-1 p-4">
          <div class="flex gap-3 mb-6">
            <form class="relative flex-1" id="form-buscador">
              <svg
                class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"
                />
              </svg>
              <input
                id="buscador"
                type="text"
                placeholder="Buscar productos..."
                class="w-full pl-9 pr-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
              <input type="submit" hidden />
            </form>
            <button
              id="ver-productos-todos"
              class="flex items-center gap-2 px-4 py-2.5 text-sm border border-gray-200 bg-white rounded-lg text-gray-600 hover:bg-gray-50 transition-colors"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
              Ver todos
            </button>
          </div>

          <div class="flex items-center justify-between mb-4">
            <h1 id="titulo-filtro" class="text-base font-medium text-gray-800">
              Todos los productos
            </h1>
            <p id="contador" class="text-xs text-gray-400"></p>
          </div>

          <div
            id="grid-productos"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
          ></div>

          <div
            id="estado-vacio"
            class="hidden flex flex-col items-center justify-center py-20 text-center"
          >
            <svg
              class="w-12 h-12 text-gray-300 mb-3"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"
              />
            </svg>
            <p class="text-gray-400 text-sm">No se encontraron productos</p>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="home.ts"></script>
  </body>
</html>
