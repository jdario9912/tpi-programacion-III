<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de pedido — MiComercio</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans min-h-screen">
    <div id="main-layout">
      <div class="p-8">
        <div class="flex items-center gap-2 text-xs text-gray-400 p-4">
          <a href="pedidos.html" class="hover:text-indigo-600 transition-colors"
            >Mis pedidos</a
          >
          <svg
            class="w-3 h-3"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 5l7 7-7 7"
            />
          </svg>
          <span id="breadcrumb-id" class="text-gray-600">Pedido #</span>
        </div>

        <div id="skeleton" class="flex flex-col gap-4">
          <div
            class="bg-white border border-gray-200 rounded-xl p-5 animate-pulse"
          >
            <div class="flex items-center justify-between mb-4">
              <div class="h-5 w-32 bg-gray-200 rounded"></div>
              <div class="h-6 w-24 bg-gray-200 rounded-full"></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
              <div class="h-14 bg-gray-100 rounded-lg"></div>
              <div class="h-14 bg-gray-100 rounded-lg"></div>
              <div class="h-14 bg-gray-100 rounded-lg"></div>
            </div>
          </div>
          <div
            class="bg-white border border-gray-200 rounded-xl p-5 animate-pulse flex flex-col gap-3"
          >
            <div class="h-4 w-24 bg-gray-200 rounded"></div>
            <div class="h-20 bg-gray-100 rounded-lg"></div>
            <div class="h-20 bg-gray-100 rounded-lg"></div>
          </div>
        </div>

        <div
          id="estado-error"
          class="hidden flex flex-col items-center justify-center py-24 text-center"
        >
          <svg
            class="w-12 h-12 text-gray-300 mb-3"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
            />
          </svg>
          <p class="text-gray-400 text-sm mb-4">No se pudo cargar el pedido</p>
          <a href="pedidos.html" class="text-sm text-indigo-600 hover:underline"
            >Volver a mis pedidos</a
          >
        </div>

        <div id="contenido" class="hidden flex flex-col gap-4">
          <div class="bg-white border border-gray-200 rounded-xl p-5">
            <div class="flex items-start justify-between mb-5">
              <div>
                <h1
                  id="pedido-titulo"
                  class="text-lg font-medium text-gray-900"
                >
                  Pedido #
                </h1>
                <p id="pedido-fecha" class="text-xs text-gray-400 mt-0.5"></p>
              </div>
              <span
                id="pedido-estado"
                class="inline-flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full border"
              ></span>
            </div>

            <div class="grid grid-cols-3 gap-3">
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">Forma de pago</p>
                <p id="pedido-pago" class="text-sm font-medium text-gray-800">
                  —
                </p>
              </div>
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">Productos</p>
                <p
                  id="pedido-cantidad"
                  class="text-sm font-medium text-gray-800"
                >
                  —
                </p>
              </div>
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">Total</p>
                <p id="pedido-total" class="text-sm font-medium text-gray-800">
                  —
                </p>
              </div>
            </div>
          </div>

          <div
            class="bg-white border border-gray-200 rounded-xl overflow-hidden"
          >
            <div class="px-5 py-4 border-b border-gray-100">
              <h2 class="text-sm font-medium text-gray-900">
                Productos del pedido
              </h2>
            </div>
            <div id="lista-detalles" class="divide-y divide-gray-50"></div>

            <div
              class="px-5 py-4 bg-gray-50 border-t border-gray-100 flex flex-col gap-2"
            >
              <div
                class="flex items-center justify-between text-sm text-gray-500"
              >
                <span>Subtotal</span>
                <span
                  id="res-subtotal"
                  class="font-medium text-gray-800"
                ></span>
              </div>
              <div
                class="flex items-center justify-between text-sm font-medium text-gray-900 pt-2 border-t border-gray-200"
              >
                <span>Total</span>
                <span id="res-total"></span>
              </div>
            </div>
          </div>

          <a
            href="pedidos.html"
            class="flex items-center gap-2 text-sm text-gray-500 hover:text-indigo-600 transition-colors self-start"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 19l-7-7 7-7"
              />
            </svg>
            Volver a mis pedidos
          </a>
        </div>
      </div>
    </div>
    <script type="module" src="pedido.ts"></script>
  </body>
</html>
